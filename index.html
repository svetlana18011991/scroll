<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Генератор скролл-блока для Genially</title>
    <link href="https://fonts.googleapis.com/css2?family=Amatic+SC&family=Bad+Script&family=Caveat&family=Comfortaa&family=Comic+Neue&family=Lora&family=Marck+Script&family=Montserrat&family=Neucha&family=Open+Sans&family=Oswald&family=Pacifico&family=Playfair+Display&family=PT+Serif&family=Roboto&family=Roboto+Slab&family=Ubuntu&display=swap" rel="stylesheet">
    <style>
        body { 
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; 
            padding: 20px; 
            margin: 0;
            display: flex; 
            flex-wrap: wrap;
            gap: 20px; 
            background: #121212; /* Темный фон страницы */
            color: #e0e0e0;
        }
        
        /* Стили для шапки с логотипом */
        header {
            width: 100%;
            display: flex;
            align-items: center;
            gap: 15px;
            margin-bottom: 5px;
        }
        .logo-img {
            width: 70px;
            height: 70px;
            object-fit: cover;
            border-radius: 50%;
            border: 2px solid #ff6600;
            box-shadow: 0 0 10px rgba(255, 102, 0, 0.6);
        }
        .header-text h1 {
            margin: 0;
            color: #ff6600;
            font-size: 26px;
            text-shadow: 0 0 8px rgba(255, 102, 0, 0.5);
            letter-spacing: 0.5px;
        }
        .header-text p {
            margin: 4px 0 0 0;
            color: #b3b3b3;
            font-size: 16px;
        }

        /* Стили панелей с оранжевым неоном */
        .panel { 
            background: #1e1e1e; 
            padding: 25px; 
            border-radius: 12px; 
            width: calc(50% - 10px); 
            box-sizing: border-box;
            display: flex;
            flex-direction: column;
            border: 1px solid #ff6600;
            box-shadow: 0 0 15px rgba(255, 102, 0, 0.2), inset 0 0 10px rgba(255, 102, 0, 0.1);
        }
        h2 { 
            margin-top: 0; 
            color: #ff6600; 
            text-shadow: 0 0 5px rgba(255, 102, 0, 0.3);
        }
        label { display: block; margin-top: 15px; font-weight: 600; font-size: 14px; color: #ccc; }
        
        /* Темные поля ввода */
        textarea, input[type="text"], select, input[type="number"] { 
            width: 100%; 
            margin-top: 8px; 
            padding: 10px; 
            box-sizing: border-box; 
            background: #2a2a2a;
            color: #fff;
            border: 1px solid #444; 
            border-radius: 6px; 
            font-family: inherit;
            font-size: 14px;
            transition: border 0.3s, box-shadow 0.3s;
        }
        textarea:focus, input[type="text"]:focus, select:focus, input[type="number"]:focus {
            outline: none;
            border-color: #ff6600;
            box-shadow: 0 0 8px rgba(255, 102, 0, 0.5);
        }
        textarea { height: 120px; resize: vertical; }
        .row { display: flex; gap: 15px; }
        .row > div { flex: 1; }
        .color-picker { display: flex; align-items: center; gap: 10px; margin-top: 8px; }
        input[type="color"] { border: none; width: 40px; height: 40px; cursor: pointer; border-radius: 4px; padding: 0; background: transparent; }
        .checkbox-group { display: flex; align-items: center; gap: 8px; margin-top: 15px; }
        .checkbox-group label { margin: 0; font-weight: normal; cursor: pointer;}
        
        /* Неоновая кнопка */
        button { 
            margin-top: auto; 
            padding: 15px 20px; 
            background: transparent; 
            color: #ff6600; 
            border: 2px solid #ff6600; 
            border-radius: 6px; 
            cursor: pointer; 
            font-size: 16px; 
            font-weight: 600;
            width: 100%; 
            box-shadow: 0 0 10px rgba(255, 102, 0, 0.3);
            transition: all 0.2s ease-in-out;
            text-transform: uppercase;
            letter-spacing: 1px;
        }
        button:hover { 
            background: #ff6600; 
            color: #121212;
            box-shadow: 0 0 20px rgba(255, 102, 0, 0.7);
        }
        button:active { transform: scale(0.98); }
        
        #preview-wrapper { 
            width: 100%; 
            flex-grow: 1;
            min-height: 400px; 
            border: 2px dashed #ff6600; 
            border-radius: 8px;
            margin-top: 15px; 
            padding: 10px;
            box-sizing: border-box;
            background: #ffffff; /* Белый фон для имитации слайда Genially */
            box-shadow: inset 0 0 10px rgba(0,0,0,0.5);
        }
        #preview-container {
            width: 100%;
            height: 100%;
            resize: both; 
            overflow: auto; 
        }
        
        /* Кастомный скроллбар для самого генератора (под темную тему) */
        ::-webkit-scrollbar { width: 10px; }
        ::-webkit-scrollbar-track { background: #121212; }
        ::-webkit-scrollbar-thumb { background: #444; border-radius: 5px; border: 2px solid #121212; }
        ::-webkit-scrollbar-thumb:hover { background: #ff6600; }
    </style>
</head>
<body>

    <header>
        <img src="logo.png" alt="Логотип" class="logo-img" onerror="this.style.display='none'">
        <div class="header-text">
            <h1>Шкатулка интерактивов</h1>
            <p>Светлана Быкова</p>
        </div>
    </header>

    <div class="panel">
        <h2>Настройки блока</h2>
        
        <label>Текст (можно использовать абзацы):</label>
        <textarea id="textContent">Вставьте сюда текст.
Он будет плавно прокручиваться внутри рамки.</textarea>

        <div class="row">
            <div>
                <label>Шрифт текста:</label>
                <select id="fontFamily">
                    <option value="Arial, sans-serif">Arial (Классический)</option>
                    <option value="Georgia, serif">Georgia (С засечками)</option>
                    <option value="'Trebuchet MS', sans-serif">Trebuchet MS</option>
                    <option value="'Roboto', sans-serif" data-gf="Roboto">Roboto</option>
                    <option value="'Open Sans', sans-serif" data-gf="Open+Sans" selected>Open Sans</option>
                    <option value="'Montserrat', sans-serif" data-gf="Montserrat">Montserrat</option>
                    <option value="'Oswald', sans-serif" data-gf="Oswald">Oswald</option>
                    <option value="'Ubuntu', sans-serif" data-gf="Ubuntu">Ubuntu</option>
                    <option value="'Lora', serif" data-gf="Lora">Lora (С засечками)</option>
                    <option value="'PT Serif', serif" data-gf="PT+Serif">PT Serif (С засечками)</option>
                    <option value="'Playfair Display', serif" data-gf="Playfair+Display">Playfair Display</option>
                    <option value="'Roboto Slab', serif" data-gf="Roboto+Slab">Roboto Slab</option>
                    <option value="'Comfortaa', cursive" data-gf="Comfortaa">Comfortaa (Округлый)</option>
                    <option value="'Caveat', cursive" data-gf="Caveat">Caveat (Рукописный)</option>
                    <option value="'Pacifico', cursive" data-gf="Pacifico">Pacifico (Каллиграфия)</option>
                    <option value="'Amatic SC', cursive" data-gf="Amatic+SC">Amatic SC (Тонкий игровой)</option>
                    <option value="'Comic Neue', cursive" data-gf="Comic+Neue">Comic Neue (Неформальный)</option>
                    <option value="'Neucha', cursive" data-gf="Neucha">Neucha (Детский)</option>
                    <option value="'Marck Script', cursive" data-gf="Marck+Script">Marck Script (Элегантный рукописный)</option>
                    <option value="'Bad Script', cursive" data-gf="Bad+Script">Bad Script (Быстрый почерк)</option>
                </select>
            </div>
            <div>
                <label>Размер шрифта (px):</label>
                <input type="number" id="fontSize" value="18" min="10" max="72">
            </div>
        </div>

        <label>Ссылка на картинку (если нужно):</label>
        <input type="text" id="imgUrl" placeholder="https://... (оставьте пустым, если картинка не нужна)">

        <div class="row">
            <div>
                <label>Цвет фона и текста:</label>
                <div class="color-picker">
                    <input type="color" id="bgColor" value="#ffffff" title="Цвет фона">
                    <input type="color" id="textColor" value="#2d3436" title="Цвет текста">
                </div>
            </div>
        </div>

        <div class="checkbox-group">
            <input type="checkbox" id="transparentBg">
            <label for="transparentBg" style="margin-top: 0;">Сделать фон прозрачным</label>
        </div>

        <div class="checkbox-group">
            <input type="checkbox" id="neonGlow">
            <label for="neonGlow" style="margin-top: 0;">Включить неоновое свечение рамки</label>
        </div>
        
        <div id="neonColorGroup" style="display:none;">
            <label>Цвет свечения:</label>
            <input type="color" id="neonColor" value="#ff6600">
        </div>

        <br><br>
        <button onclick="copyCode()" id="copyBtn">Скопировать код</button>
    </div>

    <div class="panel">
        <h2>Предпросмотр</h2>
        <p style="color: #888; font-size: 0.9em; margin-top: 0;">Растяните блок за правый нижний угол, чтобы проверить скролл.</p>
        <div id="preview-wrapper">
            <div id="preview-container">
                <div id="preview-content" style="height: 100%;"></div>
            </div>
        </div>
    </div>

    <script>
        let currentHtmlCode = "";

        const neonCheckbox = document.getElementById('neonGlow');
        const neonColorGroup = document.getElementById('neonColorGroup');

        neonCheckbox.addEventListener('change', (e) => {
            neonColorGroup.style.display = e.target.checked ? 'block' : 'none';
            generateCode();
        });

        const inputs = document.querySelectorAll('input, textarea, select');
        inputs.forEach(input => {
            input.addEventListener('input', generateCode);
        });

        function generateCode() {
            const text = document.getElementById('textContent').value.replace(/\n/g, '<br>');
            const fontSelect = document.getElementById('fontFamily');
            const fontFamily = fontSelect.value;
            const googleFontName = fontSelect.options[fontSelect.selectedIndex].getAttribute('data-gf');
            const fontSize = document.getElementById('fontSize').value;
            
            const imgUrl = document.getElementById('imgUrl').value;
            let bgColor = document.getElementById('bgColor').value;
            const isTransparent = document.getElementById('transparentBg').checked;
            const textColor = document.getElementById('textColor').value;
            const isNeon = document.getElementById('neonGlow').checked;
            const neonColor = document.getElementById('neonColor').value;

            if (isTransparent) {
                bgColor = 'transparent';
            }

            let neonStyle = '';
            if (isNeon) {
                neonStyle = `box-shadow: 0 0 10px ${neonColor}, 0 0 20px ${neonColor}, inset 0 0 10px ${neonColor}; border: 2px solid ${neonColor};`;
            }

            let imgHtml = imgUrl ? `<img src="${imgUrl}" style="max-width: 100%; height: auto; border-radius: 8px; margin-bottom: 15px; display: block;" alt="Изображение">` : '';

            let fontImport = '';
            if (googleFontName) {
                fontImport = `@import url('https://fonts.googleapis.com/css2?family=${googleFontName}&display=swap');`;
            }

            const innerHTML = `
            <!DOCTYPE html>
            <html>
            <head>
            <style>
                ${fontImport}
                ::-webkit-scrollbar { width: 8px; }
                ::-webkit-scrollbar-track { background: transparent; }
                ::-webkit-scrollbar-thumb { background: rgba(136, 136, 136, 0.4); border-radius: 10px; }
                ::-webkit-scrollbar-thumb:hover { background: rgba(136, 136, 136, 0.7); }
                body { margin: 0; padding: 0; background: transparent; overflow: hidden; }
                .scroll-container {
                    width: 100vw; height: 100vh; overflow-y: auto; background: ${bgColor}; color: ${textColor}; padding: 20px; box-sizing: border-box; border-radius: 12px; ${neonStyle};
                }
            </style>
            </head>
            <body>
                <div class="scroll-container">
                    ${imgHtml}
                    <div style="font-family: ${fontFamily}; line-height: 1.6; font-size: ${fontSize}px;">
                        ${text}
                    </div>
                </div>
            </body>
            </html>
            `;

            const escapedHTML = innerHTML.replace(/"/g, '&quot;');
            currentHtmlCode = `<iframe style="width: 100%; height: 100%; border: none; background: transparent;" srcdoc="${escapedHTML}"></iframe>`;
            document.getElementById('preview-content').innerHTML = currentHtmlCode;
        }

        function copyCode() {
            const tempTextArea = document.createElement("textarea");
            tempTextArea.value = currentHtmlCode;
            document.body.appendChild(tempTextArea);
            tempTextArea.select();
            document.execCommand("copy");
            document.body.removeChild(tempTextArea);
            
            const btn = document.getElementById('copyBtn');
            const originalText = btn.innerText;
            btn.innerText = '✓ Скопировано!';
            btn.style.background = '#ff6600'; 
            btn.style.color = '#121212';
            btn.style.boxShadow = '0 0 20px rgba(255, 102, 0, 0.8)';
            setTimeout(() => { 
                btn.innerText = originalText; 
                btn.style.background = 'transparent';
                btn.style.color = '#ff6600';
                btn.style.boxShadow = '0 0 10px rgba(255, 102, 0, 0.3)';
            }, 2500);
        }

        generateCode();
    </script>
</body>
</html>
